<!DOCTYPE html>
<html>
<head>
  <title>Process Logo</title>
</head>
<body>
  <h1>Processing Logo...</h1>
  <canvas id="canvas" style="display:none;"></canvas>
  <script>
    const img = new Image();
    img.src = 'logo.png';
    img.onload = () => {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);

      const imgData = ctx.getImageData(0, 0, img.width, img.height);
      const data = imgData.data;

      // First pass: Find bounding box of non-white pixels
      let minX = img.width;
      let maxX = 0;
      let minY = img.height;
      let maxY = 0;
      let found = false;

      for (let y = 0; y < img.height; y++) {
        for (let x = 0; x < img.width; x++) {
          const idx = (y * img.width + x) * 4;
          const r = data[idx];
          const g = data[idx+1];
          const b = data[idx+2];

          // If pixel is not white (threshold: 240)
          if (r < 240 || g < 240 || b < 240) {
            found = true;
            if (x < minX) minX = x;
            if (x > maxX) maxX = x;
            if (y < minY) minY = y;
            if (y > maxY) maxY = y;
          }
        }
      }

      if (!found) {
        console.error("No logo content found!");
        document.body.innerHTML += '<p style="color:red;">Error: No logo content found.</p>';
        return;
      }

      // Add a small padding (say 5 pixels) to not cut off edges
      const padding = 10;
      minX = Math.max(0, minX - padding);
      minY = Math.max(0, minY - padding);
      maxX = Math.min(img.width - 1, maxX + padding);
      maxY = Math.min(img.height - 1, maxY + padding);

      const croppedWidth = maxX - minX + 1;
      const croppedHeight = maxY - minY + 1;

      // Second pass: Create cropped canvas and make white pixels transparent
      const croppedCanvas = document.createElement('canvas');
      croppedCanvas.width = croppedWidth;
      croppedCanvas.height = croppedHeight;
      const croppedCtx = croppedCanvas.getContext('2d');
      
      // Get cropped image data from main canvas
      const croppedData = ctx.getImageData(minX, minY, croppedWidth, croppedHeight);
      const cData = croppedData.data;

      for (let i = 0; i < cData.length; i += 4) {
        const r = cData[i];
        const g = cData[i+1];
        const b = cData[i+2];

        // If pixel is white/near-white, make it transparent
        if (r > 240 && g > 240 && b > 240) {
          cData[i+3] = 0; // set alpha to 0
        }
      }

      croppedCtx.putImageData(croppedData, 0, 0);
      const dataUrl = croppedCanvas.toDataURL('image/png');

      // Send the transparent, cropped image to the server
      fetch('http://localhost:8081/upload', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ image: dataUrl })
      })
      .then(res => res.json())
      .then(res => {
        if (res.success) {
          console.log('Logo processed and saved!');
          document.body.innerHTML = '<h1 style="color:green;">Logo successfully processed and saved! You can close this window.</h1>';
        } else {
          console.error('Failed to save logo:', res.error);
          document.body.innerHTML = '<h1 style="color:red;">Server error saving logo.</h1>';
        }
      })
      .catch(err => {
        console.error('Fetch error:', err);
        document.body.innerHTML = '<h1 style="color:red;">Error connecting to processing server.</h1>';
      });
    };
  </script>
</body>
</html>
